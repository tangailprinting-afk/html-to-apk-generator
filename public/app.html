<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>
SDK TEST APP
</title>

<style>

body {

  background: #111;

  color: white;

  font-family: sans-serif;

  padding: 20px;
}

button {

  width: 100%;

  padding: 15px;

  margin-bottom: 10px;

  border: none;

  border-radius: 10px;

  background: #333;

  color: white;

  font-size: 18px;
}

pre {

  background: #000;

  padding: 15px;

  border-radius: 10px;

  overflow: auto;
}

</style>

</head>

<body>

<h1>
ANDROID SDK TEST
</h1>

<button onclick="testStorage()">
TEST STORAGE
</button>

<button onclick="testSQLite()">
TEST SQLITE
</button>

<button onclick="testShare()">
TEST SHARE
</button>

<button onclick="testNetwork()">
TEST NETWORK
</button>

<button onclick="testDevice()">
TEST DEVICE
</button>

<button onclick="testOneSignal()">
TEST ONESIGNAL
</button>

<pre id="output">
Waiting...
</pre>

<script>

const output =
  document.getElementById(
    "output"
  );

function log(data) {

  output.innerHTML =
    JSON.stringify(
      data,
      null,
      2
    );
}

// STORAGE

async function testStorage() {

  try {

    await window.AndroidStorage.save(
      "test.txt",
      "HELLO STORAGE"
    );

    const data =
      await window.AndroidStorage.read(
        "test.txt"
      );

    log({

      storage: data
    });

  } catch (error) {

    log(error);
  }
}

// SQLITE

async function testSQLite() {

  try {

    await window.AndroidDB.addNote(
      "Cash",
      "500 taka"
    );

    const notes =
      await window.AndroidDB.getNotes();

    log(notes);

  } catch (error) {

    log(error);
  }
}

// SHARE

async function testShare() {

  try {

    await window.AndroidShare.share(
      "SDK TEST",
      "Hello from APK"
    );

    log({
      share: "opened"
    });

  } catch (error) {

    log(error);
  }
}

// NETWORK

async function testNetwork() {

  try {

    const online =
      await window.AndroidNetwork.isOnline();

    log({
      online
    });

  } catch (error) {

    log(error);
  }
}

// DEVICE

async function testDevice() {

  try {

    const info =
      await window.AndroidDevice.getInfo();

    log(info);

  } catch (error) {

    log(error);
  }
}

// ONESIGNAL

async function testOneSignal() {

  try {

    log({

      oneSignal:
        "Check Dashboard Audience"
    });

  } catch (error) {

    log(error);
  }
}

</script>



<script src="/android-sdk.js"></script>

<script>

window.APP_FEATURES =
{"onesignal":true,"storage":true,"sqlite":true,"share":true,"network":true,"device":true};
window.APP_PACKAGE =
"com.rabbir.app";


</script>


<script type="module">

import {
  OneSignal
}
from
'https://esm.sh/@onesignal/capacitor-plugin';

window.addEventListener(
  'DOMContentLoaded',
  async () => {

    try {

      await OneSignal.initialize(
        "cf9a26bb-42ee-439b-a8d1-bb3ca6ca6d06"
      );

      OneSignal.Notifications.requestPermission(
        true
      );

      console.log(
        "OneSignal Ready"
      );

    } catch (error) {

      console.log(error);
    }
  }
);

</script>

</body>

</html>
