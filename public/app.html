<!DOCTYPE html>
<html>

<head>
  <title>Android SDK Test</title>
</head>

<body>

<h1>Android SDK Working</h1>

<button onclick="testDB()">
  Save Note
</button>

<button onclick="loadDB()">
  Load Notes
</button>

<script>

async function testDB() {

  await window.AndroidDB.addNote(
    "Cash",
    "500 taka"
  );

  alert("Saved");
}

async function loadDB() {

  const notes =
    await window.AndroidDB.getNotes();

  alert(
    JSON.stringify(notes)
  );
}

</script>



<script src="/android-sdk.js"></script>


<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js"></script>

<script>

window.OneSignalDeferred =
  window.OneSignalDeferred || [];

OneSignalDeferred.push(
  async function (OneSignal) {

    await OneSignal.init({

      appId:
        "cf9a26bb-42ee-439b-a8d1-bb3ca6ca6d06",

      notifyButton: {
        enable: true,
      },

      allowLocalhostAsSecureOrigin: true,
    });
  }
);

</script>

</body>

</html>
